# inventory/prod.ini
# ======================================================
# Recommended production inventory (with JumpHost via Proxy VIP)
# - Control node (new PC) reaches 10.2.2.0/24 directly
# - DB/etcd (10.2.3.0/24) are accessed through Proxy External VIP (10.2.2.254)
# ======================================================

# ------------------------------
# Global defaults
# ------------------------------
[all:vars]
ansible_user=root
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

# ------------------------------
# Proxy (HA / LB / NAT / VIP)
# ------------------------------
[proxy]
proxy1 ansible_host=10.2.2.20
proxy2 ansible_host=10.2.2.21

# ------------------------------
# Storage (NFS / Backup Repository)
# ------------------------------
[storage]
storage1 ansible_host=10.2.2.30

# ------------------------------
# Database (PostgreSQL + Patroni)
# ------------------------------
[db]
db-a ansible_host=10.2.3.2
db-s ansible_host=10.2.3.3
db-b ansible_host=10.2.3.4

# Patroni logical groups (optional but useful)
[db_primary]
db-a

[db_replica]
db-s

[db_backup]
db-b

# ------------------------------
# etcd cluster
# ------------------------------
[etcd]
etcd-1 ansible_host=10.2.3.20
etcd-2 ansible_host=10.2.3.21
etcd-3 ansible_host=10.2.3.22

# ======================================================
# JumpHost settings (Recommended)
# Use Proxy External VIP as Bastion so failover is automatic.
# ======================================================
[db:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyJump=root@10.2.2.254'

[etcd:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyJump=root@10.2.2.254'

